name: 'Claude PR Review'
description: >
  AI-powered PR review triggered by /review. Automatically detects first-time
  review vs re-review based on whether a prior PR Verdict comment exists on the PR.

inputs:
  claude_token:
    description: 'Claude OAuth token. Conventionally CLAUDE_TOKEN_{github_username} (lowercase).'
    required: false

runs:
  using: composite
  steps:
    - name: Validate Claude token
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        CLAUDE_TOKEN: ${{ inputs.claude_token }}
      run: |
        if [[ -z "$CLAUDE_TOKEN" ]]; then
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "**AI review failed:** No Claude token configured for \`${{ github.event.comment.user.login }}\`. Ask an admin to add secret \`CLAUDE_TOKEN_${{ github.event.comment.user.login }}\` to this repo's secrets."
          exit 1
        fi

    - name: Resolve PR metadata and acknowledge
      id: pr-info
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const owner     = context.repo.owner;
          const repo      = context.repo.repo;
          const prNum     = context.payload.issue.number;
          const commentId = context.payload.comment.id;
          const runUrl    = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

          const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });

          if (pr.draft) {
            core.info('PR is a draft — skipping');
            core.setOutput('skip', 'true');
            return;
          }

          // Detect mode: search for prior "PR Verdict:" comments from claude[bot].
          // A verdict comment is the definitive signal that a full review cycle completed.
          const { data: comments } = await github.rest.issues.listComments({
            owner, repo, issue_number: prNum, per_page: 100
          });
          const priorVerdicts = comments.filter(c =>
            c.user.login === 'claude[bot]' && c.body.includes('Verdict:')
          );
          const mode = priorVerdicts.length === 0 ? 'review' : 're-review';
          core.info(`==> Mode: ${mode} (${priorVerdicts.length} prior verdict(s))`);

          await github.rest.reactions.createForIssueComment({
            owner, repo, comment_id: commentId, content: 'eyes'
          });

          const emoji = mode === 'review' ? '🔍' : '🔄';
          const label = mode === 'review' ? 'AI review started' : 'AI re-review started';
          await github.rest.issues.createComment({
            owner, repo, issue_number: prNum,
            body: `${emoji} **${label}** for commit \`${pr.head.sha.slice(0, 7)}\`. [View workflow run](${runUrl})`
          });

          core.setOutput('skip',       'false');
          core.setOutput('head_sha',   pr.head.sha);
          core.setOutput('pr_url',     pr.html_url);
          core.setOutput('mode',       mode);
          core.setOutput('pr_author',  pr.user.login);

    # ── Re-review: pre-flight guard (Phase 2.1 + 2.3 early stops) ──────────────
    # The re-review skill's Phase 2.1/2.3 stops only output to the Claude agent's
    # conversation — nothing reaches GitHub. Run these checks here so a PR comment
    # explaining the skip is always posted before wasting a Claude run.
    - name: Re-review pre-flight check
      id: preflight
      if: steps.pr-info.outputs.skip == 'false' && steps.pr-info.outputs.mode == 're-review'
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const owner    = context.repo.owner;
          const repo     = context.repo.repo;
          const prNum    = context.payload.issue.number;
          const prUrl    = '${{ steps.pr-info.outputs.pr_url }}';

          // Fetch all inline comments by claude[bot]
          const { data: inlineComments } = await github.rest.pulls.listReviewComments({
            owner, repo, pull_number: prNum, per_page: 100
          });
          const reviewerComments = inlineComments.filter(c => c.user.login === 'claude[bot]');

          if (reviewerComments.length === 0) {
            // Phase 2.1: No prior inline reviewer comments.
            // If HEAD changed since the last verdict, the prior run was incomplete
            // (verdict posted but inline batch failed/timed out). Auto-switch to a
            // fresh full review rather than requiring manual verdict deletion.
            const currentHeadSha = '${{ steps.pr-info.outputs.head_sha }}';
            const { data: allIssueComments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNum, per_page: 100
            });
            const verdictComments = allIssueComments
              .filter(c => c.user.login === 'claude[bot]' && c.body.includes('<!-- reviewed-head:'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            let lastVerdictSha = null;
            if (verdictComments.length > 0) {
              const match = verdictComments[0].body.match(/<!-- reviewed-head: ([a-f0-9]+) -->/);
              if (match) lastVerdictSha = match[1];
            }

            if (lastVerdictSha && lastVerdictSha !== currentHeadSha) {
              core.info(`Phase 2.1: No inline comments but HEAD changed (${lastVerdictSha.slice(0, 7)} → ${currentHeadSha.slice(0, 7)}) — auto-switching to fresh full review`);
              core.setOutput('skip', 'false');
              core.setOutput('mode_override', 'review');
              return;
            }

            // No new commits (or no reviewed-head marker) — stop and ask user to reset
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: '**AI re-review skipped:** No prior inline review comments found from `claude[bot]`. This PR has not been fully reviewed yet. Triggering a fresh review instead is recommended — delete the existing `PR Verdict:` comment and comment `/review` again.'
            });
            core.setOutput('skip', 'true');
            return;
          }

          // Phase 2.3: Check if a *complete* review cycle already exists for this HEAD.
          // A complete cycle is proven by a verdict comment containing
          // <!-- reviewed-head: {full_sha} --> — injected by the skill after posting the verdict.
          //
          // Checking inline comment commit_id is insufficient: a prior run may have posted
          // inline comments for this HEAD but timed out before posting the verdict, leaving
          // no proof of completion. Using the verdict marker avoids false "already reviewed"
          // skips in that scenario.
          const currentHeadSha = '${{ steps.pr-info.outputs.head_sha }}';
          const { data: issueComments } = await github.rest.issues.listComments({
            owner, repo, issue_number: prNum, per_page: 100
          });
          const verdictForCurrentHead = issueComments.some(c =>
            c.user.login === 'claude[bot]' &&
            c.body.includes(`<!-- reviewed-head: ${currentHeadSha} -->`)
          );

          if (verdictForCurrentHead) {
            // Phase 2.3 stop: a complete review cycle exists for this HEAD
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: `**AI re-review skipped:** No changes since last review (head is still \`${currentHeadSha.slice(0, 7)}\`). Push new commits or force-push a rebase to trigger a re-review.`
            });
            core.setOutput('skip', 'true');
            return;
          }

          core.setOutput('skip', 'false');

    # ── Re-review: verify commenter is PR author or trusted member ──────────
    - name: Re-review security check
      id: security
      if: steps.pr-info.outputs.skip == 'false' && steps.pr-info.outputs.mode == 're-review' && steps.preflight.outputs.skip != 'true' && steps.preflight.outputs.mode_override != 'review'
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const commenterLogin = context.payload.comment.user.login;
          const authorAssoc    = context.payload.comment.author_association;
          const prAuthor       = '${{ steps.pr-info.outputs.pr_author }}';
          const trusted        = ['OWNER', 'MEMBER', 'COLLABORATOR'];

          if (commenterLogin !== prAuthor && !trusted.includes(authorAssoc)) {
            core.info(`${commenterLogin} is not the PR author or a trusted member — skipping re-review`);
            core.setOutput('skip', 'true');
            return;
          }
          core.setOutput('skip', 'false');

    # ── Review mode: guard against reviewing the same commit twice ──────────
    - name: Loop guard
      id: loop_guard
      if: steps.pr-info.outputs.skip == 'false' && (steps.pr-info.outputs.mode == 'review' || steps.preflight.outputs.mode_override == 'review')
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        REVIEWER_LOGIN="claude[bot]"
        HEAD_SHA="${{ steps.pr-info.outputs.head_sha }}"
        PR_NUMBER="${{ github.event.issue.number }}"
        REPO="${{ github.repository }}"

        EXISTING=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" \
          --paginate \
          --jq "[.[] | select(.user.login == \"${REVIEWER_LOGIN}\" and .commit_id == \"${HEAD_SHA}\")] | length")

        if [ "${EXISTING}" -gt "0" ]; then
          echo "Loop guard: already reviewed commit ${HEAD_SHA} — skipping"
          gh pr comment "${PR_NUMBER}" \
            --body "**AI review skipped:** Commit \`${HEAD_SHA:0:7}\` was already reviewed. Push a new commit to trigger a re-review."
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    # ── Context preparation (both modes) ────────────────────────────────────
    - name: Prepare review context
      if: |
        steps.pr-info.outputs.skip == 'false' &&
        steps.preflight.outputs.skip != 'true' &&
        steps.loop_guard.outputs.skip != 'true' &&
        steps.security.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        bash "${{ github.action_path }}/../scripts/prepare-review-context.sh" \
          "${{ github.event.issue.number }}" \
          "${{ github.repository }}"

    # ── Context summary comment (debug visibility) ──────────────────────────
    - name: Post context summary
      if: |
        steps.pr-info.outputs.skip == 'false' &&
        steps.preflight.outputs.skip != 'true' &&
        steps.loop_guard.outputs.skip != 'true' &&
        steps.security.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PR_NUMBER="${{ github.event.issue.number }}"
        LINE_COUNT=$(wc -l < review_context.md | tr -d ' ')

        DOMAINS=$(grep "^## Domain:" review_context.md | sed 's/^## Domain: //' || true)
        DOMAIN_COUNT=$(echo "$DOMAINS" | grep -c '[^[:space:]]' || echo 0)

        HAS_CLAUDE=$(grep -c "^## CLAUDE.md" review_context.md || true)
        HAS_CROSS=$(grep -c "^## Cross-domain invariants" review_context.md || true)

        ROWS=""
        while IFS= read -r domain; do
          [ -z "$domain" ] && continue
          INV=$(awk "/^## Domain: ${domain}$/{f=1;next} f && /^## Domain: /{exit} f" review_context.md | grep -c "^### Invariants" || true)
          ARCH=$(awk "/^## Domain: ${domain}$/{f=1;next} f && /^## Domain: /{exit} f" review_context.md | grep -c "^### Architecture" || true)
          SPEC=$(awk "/^## Domain: ${domain}$/{f=1;next} f && /^## Domain: /{exit} f" review_context.md | grep -c "^### Testspecs" || true)
          IMPL=$(awk "/^## Domain: ${domain}$/{f=1;next} f && /^## Domain: /{exit} f" review_context.md | grep -c "^### Active Implspec" || true)
          ROWS="${ROWS}| \`${domain}\` | $([ "$INV" -gt 0 ] && echo "✅" || echo "—") | $([ "$ARCH" -gt 0 ] && echo "✅" || echo "—") | $([ "$SPEC" -gt 0 ] && echo "✅" || echo "—") | $([ "$IMPL" -gt 0 ] && echo "✅" || echo "—") |\n"
        done <<< "$DOMAINS"

        BASELINE=""
        [ "$HAS_CLAUDE" -gt 0 ] && BASELINE="CLAUDE.md ✅"
        [ "$HAS_CROSS" -gt 0 ] && BASELINE="${BASELINE} · Cross-domain invariants ✅"
        [ -z "$BASELINE" ] && BASELINE="⚠️ No baseline docs found"

        if [ "$DOMAIN_COUNT" -eq 0 ]; then
          DOMAIN_SECTION="⚠️ **No domains detected** — only baseline context was loaded. Review may lack domain-specific invariants and testspecs."
        else
          DOMAIN_SECTION="$(printf "| Domain | Invariants | Architecture | Testspecs | Implspec |\n|---|---|---|---|---|\n%b" "$ROWS")"
        fi

        gh pr comment "$PR_NUMBER" --body "$(printf "📋 **Review context loaded** — %s lines · %s domain(s)\n\n%s\n\n> %s" "$LINE_COUNT" "$DOMAIN_COUNT" "$DOMAIN_SECTION" "$BASELINE")"

    # ── Linter pre-pass (B2) ────────────────────────────────────────────────
    # Runs golangci-lint scoped to the PR diff. If findings exist, posts a
    # PR comment listing them and fails — blocking the Claude review until
    # the author fixes the issues and pushes again. On a clean pass, appends
    # a "no findings" note to review_context.md so Claude doesn't re-flag
    # the same categories.
    - name: Set up Go for linter pre-pass
      if: hashFiles('go.mod') != ''
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: false

    - name: Run linter pre-pass
      id: lint
      if: |
        steps.pr-info.outputs.skip == 'false' &&
        steps.preflight.outputs.skip != 'true' &&
        steps.loop_guard.outputs.skip != 'true' &&
        steps.security.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        bash "${{ github.action_path }}/../scripts/run-lint-prepass.sh" \
          "${{ github.event.issue.number }}" \
          "${{ github.repository }}"

    # If the lint step failed for an infrastructure reason (install crash,
    # git fetch failure, etc.) the script exits non-zero WITHOUT setting
    # comment_posted — meaning the PR author has no visible feedback.
    # This catch step posts a generic error comment in that case only.
    - name: Post linter infrastructure error
      if: failure() && steps.lint.conclusion == 'failure' && steps.lint.outputs.comment_posted != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr comment "${{ github.event.issue.number }}" \
          --repo "${{ github.repository }}" \
          --body "**AI review failed:** The linter pre-pass step crashed before it could run \`golangci-lint\`. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. Fix the infrastructure issue and comment \`/review\` again."

    # ── Full review (first-time) ─────────────────────────────────────────────
    - name: Run full review
      if: |
        steps.pr-info.outputs.skip == 'false' &&
        (steps.pr-info.outputs.mode == 'review' || steps.preflight.outputs.mode_override == 'review') &&
        steps.loop_guard.outputs.skip != 'true'
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ github.token }}
      with:
        claude_code_oauth_token: ${{ inputs.claude_token }}
        prompt: |
          AUTOMATED MODE: You are running as a GitHub Actions bot (claude[bot]).
          Skip Phase 2.5 (Human Approval Gate) — post all findings directly without waiting for approval.
          Do not ask any questions. Complete all phases through Phase 4 (Emit Verdict) without interruption.
          REVIEWER_LOGIN is 'claude[bot]'.
          The PR URL is: ${{ steps.pr-info.outputs.pr_url }}

          Read the file "${{ github.action_path }}/../skills/review-pr/SKILL.md" and follow all its instructions exactly.
        claude_args: |
          --model claude-sonnet-4-6
          --allowedTools "Bash(gh*),Read,Glob,Grep"
          --max-turns 50

    # ── Re-review (subsequent /review after prior feedback) ─────────────────
    - name: Run re-review
      if: |
        steps.pr-info.outputs.skip == 'false' &&
        steps.pr-info.outputs.mode == 're-review' &&
        steps.preflight.outputs.skip != 'true' &&
        steps.preflight.outputs.mode_override != 'review' &&
        steps.security.outputs.skip != 'true'
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ github.token }}
      with:
        claude_code_oauth_token: ${{ inputs.claude_token }}
        prompt: |
          AUTOMATED MODE: You are running as a GitHub Actions bot (claude[bot]).
          Skip Phase 3 approval gate — automatically proceed with the classification table without waiting for YES.
          Skip Phase 7 approval gate — automatically post all new findings without waiting for YES.
          All other phases execute exactly as documented in the skill.
          REVIEWER_LOGIN is 'claude[bot]'.
          The PR URL is: ${{ steps.pr-info.outputs.pr_url }}

          Read the file "${{ github.action_path }}/../skills/re-review-pr/SKILL.md" and follow all its instructions exactly.
        claude_args: |
          --model claude-sonnet-4-6
          --allowedTools "Bash(gh*),Read,Glob,Grep"
          --max-turns 50

    - name: Post failure comment
      if: failure()
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr comment "${{ github.event.issue.number }}" \
          --repo "${{ github.repository }}" \
          --body "**AI review failed unexpectedly.** Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
